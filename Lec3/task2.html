<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo"></p>
    <button onclick="add()">font-size</button>
    <script>
        size = 15 
        x = document.getElementById('demo')
        x.innerHTML = "Hello"
        function add(){
            x.style.fontSize = size+"px"
            if(size<=50){
                size++
            }
            setInterval(add,50)   
        }
    </script>
</body>
</html>
