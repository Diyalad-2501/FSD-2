<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="add()">Start Addition</button>
    <p id="demo"></p>
    <!-- <button onclick="reset()">Reset</button> -->
    <script>
    function add(){
        let a = 2
        let b = 5 
        let count=0
       var i =  setInterval(()=>{
            document.getElementById('demo').innerHTML = ++a + ++b
            count++

            if(count===5){
                clearInterval(i)
            }
        },1000)
    }
    </script>
</body>
</html>
